
backend ="glx";
vsync = true;

active-opacity = 10;
frame-opacity = 0.8;
inactive-opacity-override = false;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];
blur-kern = "3x3box";
blur-method = "kawase";
blur-strength = 0;
opacity-rule = [
  "90:class_g = 'urxvt'"
];

shadow = true;
shadow-radius = 10;
shadow-opacity = 0.5;

shadow-ignore-shaped = false;

# corner-radius = 15;
rounded-corners-exclude = [
  "window_type = 'dock'"
];

# Specify the animation type
animation = {
  # Control the animation when a window appears
  fade-in = true;
  fade-delta = 20;

  # Control the animation when a window is closed
  fade-out = true;
  fade-delta = 20;

  # Control the animation when a window is minimized/unminimized
  minimize = true;
  minimize-delta = 20;

  # Control the animation when a window is unminimized
  unminimize = true;
  unminimize-delta = 20;

  # Control the animation when a window is moved/resized
  focus-change = true;
  focus-change-delta = 20;
};

animation-for-open-window = "zoom";
animation-for-close-window = "zoom";
animation-for-menu-window = "slide-down";
animation-for-transient-window = "slide-down";
